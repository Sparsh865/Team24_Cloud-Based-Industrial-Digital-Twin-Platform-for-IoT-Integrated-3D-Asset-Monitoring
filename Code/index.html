<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>X-TWIN | Precision CAD Studio</title>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
                "three/examples/jsm/controls/OrbitControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js",
                "three/examples/jsm/controls/TransformControls.js": "https://unpkg.com/three@0.160.0/examples/jsm/controls/TransformControls.js"
            }
        }
    </script>
    <style>
        body { margin: 0; background: #f0f2f5; overflow: hidden; font-family: 'Inter', -apple-system, sans-serif; }
        #viewport { width: 100vw; height: 100vh; }
        
        /* Floating Control Bar */
        #ui-layer {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; background: rgba(255,255,255,0.95);
            padding: 12px 20px; border-radius: 50px; border: 1px solid #d1d9e0;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12); backdrop-filter: blur(12px);
            align-items: center; z-index: 100;
        }

        .ctrl-btn {
            background: #007aff; color: white; border: none; padding: 10px 22px;
            border-radius: 25px; cursor: pointer; font-weight: 600; font-size: 13px;
            transition: all 0.3s ease;
        }
        .ctrl-btn:hover { background: #0056b3; transform: translateY(-2px); }
        .ctrl-btn.stopped { background: #4a5568; }

        /* Zoom Group Styling */
        .zoom-group { 
            display: flex; gap: 8px; border-left: 1px solid #e2e8f0; padding-left: 15px; 
        }
        .zoom-btn {
            width: 38px; height: 38px; border-radius: 50%; border: 1px solid #cbd5e0;
            background: white; cursor: pointer; font-size: 20px; font-weight: 500;
            display: flex; align-items: center; justify-content: center; 
            transition: all 0.2s ease; color: #2d3748;
        }
        .zoom-btn:hover { background: #edf2f7; border-color: #007aff; color: #007aff; }
        .zoom-btn:active { transform: scale(0.9); }

        #status-label { 
            position: absolute; top: 25px; left: 30px; color: #94a3b8; 
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase; font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="status-label">Engine Active // 90% Scale Normalization</div>
    
    <div id="ui-layer">
        <button id="rotate-toggle" class="ctrl-btn">STOP MOTION</button>
        <div class="zoom-group">
            <button id="zoom-in" class="zoom-btn" title="Zoom In">+</button>
            <button id="zoom-out" class="zoom-btn" title="Zoom Out">−</button>
        </div>
    </div>

    <main id="viewport"></main>
    <script type="module" src="frontend_twin_engine.js"></script>
</body>
</html>
